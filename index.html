<style>
  :root{--nb-base:#1a0f2e;--nb-deep:#080014;--nb-purple:#6f4d89;--nb-purple-lt:#9a73b8;--green:#5ab78e;--br-green:#1ea54c;--br-yellow:#ffd400;--blue:#80c0ff;--red:#ff4d4d;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#0c0718;font-family:'DM Sans',sans-serif;color:#fff;padding:20px 14px 70px;}
  .panel{max-width:540px;margin:0 auto 22px;background:#1a0f2e;border:1px solid #2e1d4f;border-radius:20px;padding:22px;}
  .panel h1{font-family:'Instrument Serif',serif;font-size:26px;font-weight:400;margin-bottom:4px;}
  .panel .sub{font-size:13px;color:#9a86bd;margin-bottom:18px;}
  .modeswitch{display:flex;background:#241541;border-radius:14px;padding:5px;margin-bottom:18px;}
  .modeswitch button{flex:1;border:none;background:none;color:#9a86bd;font-size:15px;font-weight:700;padding:12px;border-radius:10px;cursor:pointer;}
  .modeswitch button.active{background:#6f4d89;color:#fff;}
  .row{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
  .row label{font-size:14px;font-weight:700;color:#cdbce6;}
  .row input{background:#241541;border:1px solid #6f4d89;border-radius:10px;color:#fff;font-size:15px;padding:10px 12px;width:120px;text-align:center;font-weight:700;}
  .goalbtns{display:flex;gap:12px;margin-bottom:14px;}
  .goalbtns button{flex:1;border:none;border-radius:14px;padding:20px 10px;font-size:15px;font-weight:800;cursor:pointer;color:#fff;line-height:1.2;}
  .gb-bra{background:linear-gradient(150deg,#1ea54c,#147a38);}
  .gb-adv{background:linear-gradient(150deg,#c0392b,#8e2820);}
  .goalbtns button:active{transform:scale(.96);}
  .timeline{background:#120a24;border:1px solid #2e1d4f;border-radius:14px;padding:14px 16px;min-height:56px;margin-bottom:12px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
  .timeline:empty::before{content:"Os gols aparecem aqui, na ordem real…";color:#5a4a7a;font-size:13px;}
  .chip{display:inline-flex;align-items:center;gap:6px;border-radius:100px;padding:7px 13px;font-size:13px;font-weight:700;}
  .chip.bra{background:rgba(30,165,76,.2);color:#5fdc8a;border:1px solid rgba(30,165,76,.5);}
  .chip.adv{background:rgba(192,57,43,.2);color:#ff8a7a;border:1px solid rgba(192,57,43,.5);}
  .miniactions{display:flex;gap:10px;margin-bottom:18px;}
  .miniactions button{flex:1;background:#241541;border:1px solid #6f4d89;color:#cdbce6;border-radius:10px;padding:11px;font-size:13px;font-weight:700;cursor:pointer;}
  .mainbtns{display:flex;gap:10px;}
  .dlbtn{flex:1;background:var(--green);color:#06231a;border:none;border-radius:100px;padding:17px;font-size:16px;font-weight:800;cursor:pointer;}
  .printbtn{flex:1;background:var(--br-yellow);color:#3a2600;border:none;border-radius:100px;padding:17px;font-size:16px;font-weight:800;cursor:pointer;}
  .reshuffle{width:100%;background:none;border:1px solid #6f4d89;color:#9a86bd;border-radius:100px;padding:12px;font-size:13px;font-weight:700;cursor:pointer;margin-top:10px;}
  .hint{text-align:center;font-size:12px;color:#7a679a;margin-top:12px;line-height:1.5;}
  .preview-wrap{max-width:360px;margin:0 auto;}
  .preview-label{text-align:center;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:#9a86bd;margin-bottom:12px;}
  .scaler{width:360px;height:640px;overflow:hidden;border-radius:18px;box-shadow:0 20px 50px rgba(0,0,0,.5);}
  .stage{width:1080px;height:1920px;transform-origin:top left;transform:scale(0.3333);}

  /* MODO PRINT */
  body.printmode .panel,body.printmode .preview-label,body.printmode .preview-wrap{display:none;}
  body.printmode{padding:0;background:#000;overflow:hidden;}
  #printstage{display:none;}
  body.printmode #printstage{display:block;position:fixed;inset:0;z-index:999;background:#000;}
  #printstage .pscaler{position:absolute;top:env(safe-area-inset-top,10px);left:50%;transform:translateX(-50%);overflow:hidden;border-radius:14px;}
  #printstage .closebtn{position:fixed;bottom:max(env(safe-area-inset-bottom,14px),14px);left:50%;transform:translateX(-50%);background:rgba(111,77,137,.95);color:#fff;border:none;border-radius:100px;padding:12px 24px;font-size:14px;font-weight:700;z-index:1001;box-shadow:0 6px 20px rgba(0,0,0,.5);}

  /* OVERLAY SALVAR (iOS, sem pop-up) */
  #saveOverlay{display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.96);flex-direction:column;align-items:center;justify-content:center;padding:20px;}
  #saveOverlay.on{display:flex;}
  #saveOverlay p{color:#fff;font-size:15px;text-align:center;margin-bottom:14px;line-height:1.5;max-width:420px;}
  #saveOverlay p b{color:#ffd400;}
  #saveOverlay img{width:100%;max-width:300px;height:auto;border-radius:14px;box-shadow:0 12px 40px rgba(0,0,0,.6);}
  #saveOverlay .ovclose{margin-top:18px;background:#6f4d89;color:#fff;border:none;border-radius:100px;padding:13px 30px;font-size:15px;font-weight:700;}

  #art,#artprint{width:1080px;height:1920px;position:relative;overflow:hidden;background:#1a0f2e;color:#fff;}
  .artbg{position:absolute;inset:0;z-index:0;background:radial-gradient(120% 80% at 50% 0%,#2a1748 0%,#1a0f2e 45%,#080014 100%);}
  .pad{position:absolute;inset:0;padding:140px 88px 150px 88px;display:flex;flex-direction:column;z-index:3;}
  .glow{position:absolute;inset:0;z-index:1;background:radial-gradient(75% 38% at 50% 116%,rgba(30,165,76,.55),transparent 70%),radial-gradient(55% 28% at 50% 110%,rgba(255,212,0,.26),transparent 70%);}
  .pitch{position:absolute;left:0;right:0;bottom:0;height:38%;z-index:2;opacity:.15;}
  .pitch::before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent 0 100px,rgba(255,255,255,.5) 100px 103px);transform:perspective(900px) rotateX(64deg);transform-origin:bottom;}
  .badge{position:absolute;right:-120px;top:110px;z-index:1;font-family:'Instrument Serif',serif;font-style:italic;font-size:880px;line-height:1;color:rgba(255,212,0,.06);}
  .tagtop{position:absolute;top:140px;right:88px;z-index:4;display:flex;align-items:center;gap:12px;border-radius:100px;padding:12px 24px;font-size:28px;font-weight:800;letter-spacing:.08em;}
  .tagtop.live{background:rgba(255,40,40,.15);border:2px solid var(--red);color:#ff8a8a;}
  .tagtop.fim{background:rgba(255,212,0,.12);border:2px solid var(--br-yellow);color:var(--br-yellow);}
  .tagtop .dot{width:18px;height:18px;border-radius:50%;background:var(--red);}
  .logo{height:140px;width:auto;align-self:flex-start;}
  .kicker{font-size:40px;letter-spacing:.05em;text-transform:uppercase;font-weight:800;color:var(--br-yellow);line-height:1.1;}
  .kpurple{color:var(--nb-purple-lt);font-size:30px;letter-spacing:.18em;font-weight:700;text-transform:uppercase;}
  .score{display:flex;align-items:center;gap:28px;margin-top:24px;}
  .score .tm{font-size:40px;font-weight:800;letter-spacing:.05em;color:#cdbce6;}
  .score .n{font-family:'Instrument Serif',serif;font-size:185px;line-height:.8;color:#fff;}
  .score .n.hl{color:var(--br-green);}
  .score .x{font-size:64px;color:var(--br-yellow);font-weight:800;}
  .narr{font-family:'Instrument Serif',serif;font-size:64px;line-height:1.03;margin-top:24px;color:#fff;}
  .bigpct{font-family:'Instrument Serif',serif;font-size:240px;line-height:.82;color:var(--br-green);letter-spacing:-.02em;}
  .ctx{font-size:38px;line-height:1.4;color:#e7ddf3;margin-top:16px;}
  .ctx b{color:#fff;}
  .coupon{margin-top:22px;display:inline-block;align-self:flex-start;background:var(--br-yellow);color:#3a2600;font-weight:900;font-size:44px;padding:24px 44px;border-radius:16px;letter-spacing:.02em;}
  .foot{font-size:30px;color:var(--br-yellow);letter-spacing:.01em;font-weight:700;margin-top:8px;}
  .sp{flex:1;}
</style>
</head>
<body>

<div class="panel">
  <h1>Gerador · O Hexa é do Brasil</h1>
  <p class="sub">Registre os gols na ordem real. A narrativa muda conforme a história do jogo.</p>

  <div class="modeswitch">
    <button id="m-live" class="active" onclick="setMode('live')">🔴 Ao vivo</button>
    <button id="m-fim" onclick="setMode('fim')">🏁 Final (apito)</button>
  </div>

  <div class="row">
    <label>Adversário (sigla):</label>
    <input id="advname" value="HAI" maxlength="4" oninput="draw()">
  </div>

  <div class="goalbtns">
    <button class="gb-bra" onclick="addGoal('bra')">⚽ GOL DO BRASIL</button>
    <button class="gb-adv" onclick="addGoal('adv')">GOL DO ADVERSÁRIO</button>
  </div>

  <div class="timeline" id="timeline"></div>
  <div class="miniactions">
    <button onclick="undo()">↩︎ Desfazer último</button>
    <button onclick="resetGoals()">🗑️ Zerar placar</button>
  </div>

  <div class="mainbtns">
    <button class="printbtn" onclick="enterPrint()">🖼️ Modo print</button>
    <button class="dlbtn" onclick="baixar()">📥 Baixar PNG</button>
  </div>
  <button class="reshuffle" onclick="draw()">🔄 Trocar a frase (locutor)</button>
  <p class="hint">No iPhone, toque em "Baixar PNG": a arte abre pronta, segure o dedo e salve na galeria. Ou use "Modo print".</p>
</div>

<div class="preview-wrap">
  <div class="preview-label">Pré-visualização</div>
  <div class="scaler">
    <div class="stage"><div id="art"></div></div>
  </div>
</div>

<div id="printstage">
  <div class="pscaler"><div id="artprint"></div></div>
  <button class="closebtn" onclick="exitPrint()">✕ Fechar modo print</button>
</div>

<div id="saveOverlay">
  <p>👇 Segure o dedo na imagem e toque em <b>Salvar na galeria</b></p>
  <img id="saveImg" src="" alt="arte">
  <button class="ovclose" onclick="document.getElementById('saveOverlay').classList.remove('on')">✕ Fechar</button>
</div>

let goals=[], mode='live';
const rnd=a=>a[Math.floor(Math.random()*a.length)];

function setMode(m){
  mode=m;
  document.getElementById('m-live').classList.toggle('active',m==='live');
  document.getElementById('m-fim').classList.toggle('active',m==='fim');
  draw();
}
function addGoal(t){ goals.push(t); draw(); }
function undo(){ goals.pop(); draw(); }
function resetGoals(){ goals=[]; draw(); }
function counts(){ return {bra:goals.filter(g=>g==='bra').length, adv:goals.filter(g=>g==='adv').length}; }

function story(){
  const {bra,adv}=counts();
  const last=goals[goals.length-1];
  const venceu=bra>adv, empate=bra===adv;
  let esteveAtras=false,b=0,a=0,viradaBra=false;
  for(const g of goals){ if(g==='bra')b++;else a++; if(b<a)esteveAtras=true; if(esteveAtras&&b>a)viradaBra=true; }
  let esteveFrente=false; b=0;a=0;
  for(const g of goals){ if(g==='bra')b++;else a++; if(b>a)esteveFrente=true; }
  const levouVirada=esteveFrente&&bra<adv;
  return {bra,adv,last,venceu,empate,viradaBra,levouVirada};
}

function pacote(){
  const s=story();
  const {bra,adv,last,venceu,empate,viradaBra,levouVirada}=s;
  const fim=mode==='fim';
  const dif=bra-adv;
  const parc=Math.min(6+bra*6,42);
  const golsPct=Math.min(bra*6,36);
  const tetoVivo=(6+bra*6)>=42;
  const tetoFim=(6+bra*6+6)>=48;

  if(bra===0&&adv===0){
    return {
      kicker: fim?'🏁 Apito final · 0 a 0':'🟢 Bola rolando',
      narr: rnd(['Você já saiu na frente.','Começou. E o desconto também.','Antes da bola rolar, você já ganha.']),
      ctx: rnd(['<b>Ninguém começa do zero por aqui.</b> Cada gol do Brasil faz esse número subir.','Seus <b>6%</b> já estão valendo, só por acreditar no Hexa.','Tá 0 a 0 no campo. No seu desconto, já tem 6% no placar.']),
      foot: fim?'Use seu cupom — corre que vale só até amanhã! ⏰':'A cada gol, +6%. Se o Brasil vencer, +6% no fim.'
    };
  }

  let kicker,narr,ctx,foot;

  if(fim){
    if(venceu){
      if(viradaBra){ kicker=rnd(['🏁 QUE VIRADA DO BRASIL!','🏁 VIROU E VENCEU!','🏁 QUE EMOÇÃO, BRASIL!']); narr=rnd(['Virou e venceu.','Sofreu, virou, levou.','De trás, com raça.']); }
      else if(dif>=4){ kicker=rnd(['🏁 QUE GOLEADA!','🏁 ESPETÁCULO DO BRASIL!','🏁 PASSEIO BRASILEIRO!']); narr=rnd(['Que baile!','Goleada e desconto cheio.','Show de bola.']); }
      else if(dif>=3){ kicker=rnd(['🏁 QUE JOGO DO BRASIL!','🏁 BRASIL DOMINOU!']); narr=rnd(['Dominou e venceu.','Jogou bonito.']); }
      else { kicker=rnd(['🏁 VITÓRIA DO BRASIL!','🏁 É VITÓRIA!','🏁 DEU BRASIL!']); narr=rnd(['Vitória nossa.','O Brasil venceu. E você também.','Três pontos e desconto.']); }
      ctx = tetoFim ? '<b>Você bateu o teto: 48% de desconto!</b> O máximo por jogo. Aproveita que é raro!' : '<b>6% de largada + '+golsPct+'% dos gols + 6% da vitória.</b> Esse é o seu desconto de hoje.';
      foot=rnd(['Garanta com o cupom abaixo. Corre que vale só até amanhã! 🔥','Use o cupom agora — depois de amanhã, já era! ⏰','Cupom abaixo. Não vacila, vale só até amanhã!']);
    } else if(empate){
      kicker=rnd(['🏁 Apito final · '+bra+' a '+adv,'🏁 Ficou no empate']);
      narr = bra>0?rnd(['Empate com gols nossos.','Ficou igual — mas valeu.','Empatou, mas você não.']):'Empate sem gols.';
      ctx = bra>0?'Os gols do Brasil contaram por você. <b>Seu desconto está garantido.</b>':'Mesmo no empate sem gols, você não sai de mãos vazias.';
      foot=rnd(['Use o cupom abaixo — corre que vale só até amanhã! ⏰','Cupom abaixo, válido só até amanhã. Não perde!']);
    } else {
      if(dif<=-4){ kicker=rnd(['🏁 Eita… que dia, hein? 😅','🏁 Foi mal, Seleção…','🏁 Esse a gente esquece 🙈']); narr=rnd(['Não foi NADA o nosso dia.','Vixe… melhor virar a página.','O Brasil deve uma. Você, não.']); ctx='Em campo não rolou — mas <b>o seu desconto está garantido</b> de qualquer jeito. 💪'; }
      else if(dif<=-2){ kicker=rnd(['🏁 Não foi dessa vez 😮‍💨','🏁 Dia difícil pra Seleção']); narr=rnd(['Não foi o nosso dia.','Bola pra frente, Brasil.']); ctx='A Seleção tropeçou, mas <b>o seu desconto está garantido.</b>'; }
      else { kicker=rnd(['🏁 Por pouco, Brasil 😣','🏁 Quase lá…']); narr=rnd(['Faltou pouco hoje.','Perdeu por detalhe.']); ctx='Não foi a vitória — mas <b>o seu desconto valeu.</b>'; }
      foot=rnd(['A Seleção volta mais forte. Garanta seu cupom até amanhã! ⏰','Use o cupom abaixo — corre que vale só até amanhã!']);
    }
    return {kicker,narr,ctx,foot};
  }

  // AO VIVO
  if(last==='bra'){
    if(viradaBra){ kicker=rnd(['⚽ O BRASIL VIROU!','⚽ VIRADA BRASILEIRA!','⚽ QUE REVIRAVOLTA!']); narr=rnd(['Que virada!','Sofreu e respondeu!','Não desistiu!']); }
    else if(adv===0){
      if(bra>=4){ kicker=rnd(['⚽ É GOLEADA!','⚽ NÃO PARA, BRASIL!','⚽ QUE PASSEIO!']); narr=rnd(['Que baile!','Brasil voando!','Sem dó!']); }
      else if(bra===3){ kicker=rnd(['⚽ E VAI TRÊS!','⚽ GOLAÇO, BRASIL!','⚽ A GOLEADA VEM AÍ!']); narr=rnd(['Brasil dominando!','Que fase!']); }
      else if(bra===2){ kicker=rnd(['⚽ MAIS UM!','⚽ E VAI DOIS!','⚽ BRASIL EMBALOU!']); narr=rnd(['Brasil na frente!','Cresceu no jogo!']); }
      else { kicker=rnd(['⚽ GOOOL DO BRASIL!','⚽ ABRIU O PLACAR!','⚽ É DO BRASIL!']); narr=rnd(['Abriu o placar!','Saiu o primeiro!']); }
    }
    else if(venceu){ kicker=rnd(['⚽ GOL! BRASIL NA FRENTE!','⚽ RECOLOCOU NA FRENTE!','⚽ É DO BRASIL DE NOVO!']); narr=rnd(['Brasil reassume!','De novo na liderança!']); }
    else if(empate){ kicker=rnd(['⚽ GOL! BRASIL EMPATA!','⚽ BUSCOU O EMPATE!','⚽ DEIXOU TUDO IGUAL!']); narr=rnd(['Buscou o empate!','Reagiu na hora!']); }
    else { kicker=rnd(['⚽ GOL DO BRASIL!','⚽ BRASIL DESCONTA!']); narr=rnd(['Brasil reage!','Tá vivo no jogo!']); }
    ctx = tetoVivo ? 'Você já está no <b>máximo possível em campo: '+parc+'%!</b> Agora é torcer pela vitória pra cravar o cupom. 🔥' : 'Seu desconto subiu pra <b>'+parc+'%</b> agora. E ainda dá pra crescer. 👀';
    foot='A cada gol do Brasil, +6%. Se vencer, +6% no fim. 🇧🇷';
    return {kicker,narr,ctx,foot};
  } else {
    const advdif=adv-bra;
    if(levouVirada){
      if(advdif>=3){ kicker=rnd(['🔴 Ô, Seleção… acorda! 😤','🔴 Tá complicado, hein…','🔴 Cadê o Brasil aí?']); narr=rnd(['Mas o jogo não acabou.','Dá tempo de reagir!','Vai, Brasil, reage!']); }
      else { kicker=rnd(['🔴 Adversário virou…','🔴 Tomou a virada…']); narr=rnd(['Mas o jogo é longo.','Calma, ainda dá tempo!']); }
      ctx='Mesmo assim, seus <b>'+parc+'%</b> dos gols do Brasil estão garantidos. 💪';
    } else if(empate){
      kicker=rnd(['🛡️ Empatou? Calma…','🛡️ Empate no placar…','🛡️ Igualou lá…']);
      narr=rnd(['…mas o desconto não cai.','…o seu desconto fica firme.','…aqui ninguém empata seu desconto.']);
      ctx='Gol do adversário não tira o que é seu. <b>Seus '+parc+'% seguem de pé.</b>';
    } else if(advdif>=3){
      kicker=rnd(['🔴 Eita, Seleção! 😅','🔴 Tá difícil, hein Brasil…','🔴 Bora acordar, Seleção!']);
      narr=rnd(['Mas o desconto é seu, viu?','Calma que ainda dá!','No campo tá feio, mas você tá protegido.']);
      ctx='O placar tá assim, mas <b>seus '+parc+'% já estão garantidos.</b> Bola pra frente! 🇧🇷';
    } else if(bra>adv){
      kicker=rnd(['🔴 Adversário descontou','🔴 Levou um, mas segue']);
      narr=rnd(['Brasil ainda na frente!','Tá tudo sob controle!']);
      ctx='Seu desconto segue em <b>'+parc+'%</b>. O jogo continua. 👀';
    } else {
      kicker=rnd(['🔴 Gol do adversário','🔴 Tomou o gol…']);
      narr=rnd(['Bola pra frente!','Vamos pra cima!','Reage, Brasil!']);
      ctx='Seu desconto já garantido: <b>'+parc+'%</b> pelos gols do Brasil.';
    }
    foot='Seu desconto não cai com gol do adversário. Só sobe com o do Brasil! 🇧🇷';
    return {kicker,narr,ctx,foot};
  }
}

function fill(){
  const {bra,adv}=counts();
  const tm=(document.getElementById('advname').value||'ADV').toUpperCase();
  const fim=mode==='fim';
  let pct = fim ? 6+bra*6+(bra>adv?6:0) : 6+bra*6;
  if(pct>48)pct=48;
  if(!fim&&pct>42)pct=42;
  const cupom = pct===6?'EUACREDITO':'HEXA'+pct;
  return {bra,adv,tm,fim,pct,cupom};
}

function artHTML(){
  const {bra,adv,tm,fim,pct,cupom}=fill();
  const p=pacote();
  const tag = fim
    ? '<div class="tagtop fim"><span>APITO FINAL</span></div>'
    : '<div class="tagtop live"><span class="dot"></span><span>AO VIVO</span></div>';
  const cupHTML = fim ? '<div class="coupon">'+cupom+'</div>' : '';
  const lbl = fim ? 'Desconto final de hoje' : 'Desconto acumulado até agora';
  return ''
    + '<div class="artbg"></div><div class="glow"></div><div class="pitch"></div><div class="badge">6</div>'
    + tag
    + '<div class="pad">'
    +   '<img class="logo" src="'+LOGO+'">'
    +   '<div class="sp"></div>'
    +   '<div class="kicker">'+p.kicker+'</div>'
    +   '<div class="score"><span class="tm">BRA</span><span class="n hl">'+bra+'</span><span class="x">×</span><span class="n">'+adv+'</span><span class="tm">'+tm+'</span></div>'
    +   '<div class="narr">'+p.narr+'</div>'
    +   '<div class="sp"></div>'
    +   '<div class="kpurple">'+lbl+'</div>'
    +   '<div class="bigpct">'+pct+'%</div>'
    +   cupHTML
    +   '<div class="ctx">'+p.ctx+'</div>'
    +   '<div class="sp"></div>'
    +   '<div class="foot">'+p.foot+'</div>'
    + '</div>';
}

function draw(){
  const {bra,adv}=counts();
  const tm=(document.getElementById('advname').value||'ADV').toUpperCase();
  document.getElementById('timeline').innerHTML = goals.map((g,i)=>'<span class="chip '+g+'">'+(g==='bra'?'⚽ BRA':'● '+tm)+' #'+(i+1)+'</span>').join('');
  document.getElementById('art').innerHTML = artHTML();
}

function enterPrint(){
  document.getElementById('artprint').innerHTML = artHTML();
  const vw=window.innerWidth, vh=window.innerHeight;
  const scale=Math.min(vw/1080, (vh-110)/1920); // reserva 110px embaixo p/ o botão
  const ap=document.getElementById('artprint');
  ap.style.transform='scale('+scale+')';
  ap.style.transformOrigin='top left';
  document.querySelector('#printstage .pscaler').style.width=(1080*scale)+'px';
  document.querySelector('#printstage .pscaler').style.height=(1920*scale)+'px';
  document.body.classList.add('printmode');
  window.scrollTo(0,0);
}
function exitPrint(){ document.body.classList.remove('printmode'); }

function isIOS(){ return /iP(hone|ad|od)/.test(navigator.userAgent) || (navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1); }

async function baixar(){
  const {bra,adv,tm,fim}=fill();
  const tmp=document.createElement('div');
  tmp.style.position='fixed'; tmp.style.left='-99999px'; tmp.style.top='0';
  tmp.innerHTML='<div id="artdl" style="width:1080px;height:1920px;position:relative;overflow:hidden;background:#1a0f2e;color:#fff;font-family:DM Sans,sans-serif;">'+artHTML()+'</div>';
  document.body.appendChild(tmp);
  try{
    const canvas=await html2canvas(tmp.querySelector('#artdl'),{width:1080,height:1920,scale:1,backgroundColor:'#1a0f2e',useCORS:true,logging:false});
    const dataURL=canvas.toDataURL('image/png');
    if(isIOS()){
      document.getElementById('saveImg').src=dataURL;
      document.getElementById('saveOverlay').classList.add('on');
    } else {
      const link=document.createElement('a');
      link.download=(fim?'FINAL':'AOVIVO')+'_'+bra+'x'+adv+'_'+tm+'.png';
      link.href=dataURL;
      document.body.appendChild(link); link.click(); document.body.removeChild(link);
    }
  }catch(e){
    alert('Nao consegui gerar a imagem. Use o Modo print e tire um print da tela.');
  }
  document.body.removeChild(tmp);
}

draw();
</script>
